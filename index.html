      var stickiesRef = useRef(stickies);
      var imagesRef = useRef(images);

      useEffect(function() { boxesRef.current = boxes; }, [boxes]);
      useEffect(function() { stickiesRef.current = stickies; }, [stickies]);
      useEffect(function() { imagesRef.current = images; }, [images]);

      var saveToSupabase = useCallback(function() {
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(function() {
          if (!roomIdRef.current || suppressRef.current) return;
          setIsSaving(true);
          sb.from('board_rooms').update({
            boxes: boxesRef.current,
            stickies: stickiesRef.current,
            images: imagesRef.current,
            updated_at: new Date().toISOString()
          }).eq('id', roomIdRef.current).then(function(res) {
            setIsSaving(false);
            if (res.error) console.error('Save error:', res.error);
          });
        }, 300);
      }, []);

      var subscribeToRoom = useCallback(function(code) {
        if (channelRef.current) channelRef.current.unsubscribe();
        var channel = sb.channel('room-' + code).on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'board_rooms',
          filter: 'room_code=eq.' + code
        }, function(payload) {
          var d = payload.new;
          suppressRef.current = true;
          if (d.boxes) { boxesRef.current = d.boxes; setBoxes(d.boxes); }
          if (d.stickies) { stickiesRef.current = d.stickies; setStickies(d.stickies); }
          if (d.images) { imagesRef.current = d.images; setImages(d.images); }
          setTimeout(function() { suppressRef.current = false; }, 100);
        }).subscribe(function(status) {
          console.log('Realtime status:', status);
        });
        channelRef.current = channel;
      }, []);

      var createRoom = useCallback(function() {
        var code = generateRoomCode();
        setRoomError('');
        sb.from('board_rooms').insert({
          room_code: code,
          boxes: INITIAL_BOXES,
          stickies: [],
          images: []
        }).select().then(function(res) {
          if (res.error) {
            console.error('Create error:', res.error);
            setRoomError('Failed to create room. Try again.');
            return;
          }
          var row = res.data[0];
          roomIdRef.current = row.id;
          setRoomCode(code);
          setIsConnected(true);
          subscribeToRoom(code);
          setRoomScreen('host');
        });
      }, [subscribeToRoom]);

      var joinRoom = useCallback(function() {
        if (!joinCode || joinCode.length < 6) return;
        var code = joinCode.toUpperCase();
        setRoomError('');
        sb.from('board_rooms').select('*').eq('room_code', code).then(function(res) {
          if (res.error || !res.data || res.data.length === 0) {
            setRoomError('Room not found. Check the code.');
            return;
          }
          var row = res.data[0];
          roomIdRef.current = row.id;
          setRoomCode(code);
          boxesRef.current = row.boxes || INITIAL_BOXES;
          stickiesRef.current = row.stickies || [];
          imagesRef.current = row.images || [];
          setBoxes(row.boxes || INITIAL_BOXES);
          setStickies(row.stickies || []);
          setImages(row.images || []);
          setIsConnected(true);
          subscribeToRoom(code);
          setRoomScreen('active');
        });
      }, [joinCode, subscribeToRoom]);

      var skipRoom = function() { setRoomScreen('active'); };

      // State changers with save
      var handleBoxResize = useCallback(function(id, w, h) {
        setBoxes(function(prev) {
          var next = prev.map(function(b) { return b.id === id ? Object.assign({}, b, { width: w, height: h }) : b; });
          boxesRef.current = next; saveToSupabase(); return next;
        });
      }, [saveToSupabase]);

      var handleBoxMove = useCallback(function(id, x, y) {
        setBoxes(function(prev) {
          var next = prev.map(function(b) { return b.id === id ? Object.assign({}, b, { x: x, y: y }) : b; });
          boxesRef.current = next; saveToSupabase(); return next;
        });
      }, [saveToSupabase]);

      var createSticky = useCallback(function(color) {
        var vcx = (window.innerWidth / 2 - pan.x) / zoom;
        var vcy = (window.innerHeight / 2 - pan.y) / zoom;
        var off = stickiesRef.current.length * 15;
        var ns = {
          id: 'sticky-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
          x: vcx - 100 + off, y: vcy - 80 + off,
          width: 200, height: 160, color: STICKY_COLORS[color], text: ''
        };
        setStickies(function(prev) {
          var next = prev.concat([ns]);
          stickiesRef.current = next; saveToSupabase(); return next;
        });
      }, [zoom, pan, saveToSupabase]);

      var updateSticky = useCallback(function(id, updates) {
        setStickies(function(prev) {
          var next = prev.map(function(s) { return s.id === id ? Object.assign({}, s, updates) : s; });
          stickiesRef.current = next; saveToSupabase(); return next;
        });
      }, [saveToSupabase]);

      var deleteSticky = useCallback(function(id) {
        setStickies(function(prev) {
          var next = prev.filter(function(s) { return s.id !== id; });
          stickiesRef.current = next; saveToSupabase(); return next;
        });
      }, [saveToSupabase]);

      var updateImage = useCallback(function(id, updates) {
        setImages(function(prev) {
          var next = prev.map(function(i) { return i.id === id ? Object.assign({}, i, updates) : i; });
          imagesRef.current = next; saveToSupabase(); return next;
        });
      }, [saveToSupabase]);

      var deleteImage = useCallback(function(id) {
        setImages(function(prev) {
          var next = prev.filter(function(i) { return i.id !== id; });
          imagesRef.current = next; saveToSupabase(); return next;
        });
      }, [saveToSupabase]);

      // Canvas
      var handleWheel = useCallback(function(e) {
        e.preventDefault();
        var sa = e.deltaY > 0 ? 0.95 : 1.05;
        var nz = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * sa));
        var rect = e.currentTarget.getBoundingClientRect();
        var cx = e.clientX - rect.left, cy = e.clientY - rect.top;
        setZoom(nz);
        setPan({ x: cx - (cx - pan.x) * (nz / zoom), y: cy - (cy - pan.y) * (nz / zoom) });
      }, [zoom, pan]);

      var handlePanStart = function(e) {
        var tag = e.target.tagName.toLowerCase();
        var cl = e.target.classList;
        if (tag === 'textarea' || tag === 'button' || cl.contains('sticky-note') || cl.contains('sticky-resize') ||
            cl.contains('box-resize-handle') || cl.contains('box-header') || cl.contains('box-title') ||
            cl.contains('box-subtitle') || cl.contains('box-drag-hint') || cl.contains('box-header-text') ||
            cl.contains('image-element')) return;
        setIsPanning(true);
        panStartRef.current = { x: e.clientX, y: e.clientY, px: pan.x, py: pan.y };
      };

      useEffect(function() {
        if (!isPanning) return;
        var fn = function(e) { setPan({ x: panStartRef.current.px + (e.clientX - panStartRef.current.x), y: panStartRef.current.py + (e.clientY - panStartRef.current.y) }); };
        var up = function() { setIsPanning(false); };
        document.addEventListener('mousemove', fn);
        document.addEventListener('mouseup', up);
        return function() { document.removeEventListener('mousemove', fn); document.removeEventListener('mouseup', up); };
      }, [isPanning]);

      // Image paste
      useEffect(function() {
        var fn = function(e) {
          if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') return;
          var items = e.clipboardData && (e.clipboardData.items || e.clipboardData.files);
          if (!items) return;
          for (var i = 0; i < items.length; i++) {
            if (items[i].type && items[i].type.indexOf('image') !== -1) {
              e.preventDefault();
              var blob = items[i].getAsFile ? items[i].getAsFile() : items[i];
              if (!blob) continue;
              var reader = new FileReader();
              reader.onload = function(ev) {
                compressImage(ev.target.result, 800, 0.7, function(url, w, h) {
                  var vcx = (window.innerWidth / 2 - pan.x) / zoom;
                  var vcy = (window.innerHeight / 2 - pan.y) / zoom;
                  var dw = Math.min(400, w), dh = dw * (h / w);
                  setImages(function(prev) {
                    var next = prev.concat([{
                      id: 'img-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                      x: vcx - dw / 2, y: vcy - dh / 2, width: dw, height: dh, dataUrl: url
                    }]);
                    imagesRef.current = next; saveToSupabase(); return next;
                  });
                });
              };
              reader.readAsDataURL(blob);
              break;
            }
          }
        };
        window.addEventListener('paste', fn);
        return function() { window.removeEventListener('paste', fn); };
      }, [zoom, pan, saveToSupabase]);

      // Room screens
      if (roomScreen === 'choose') {
        return React.createElement('div', { className: 'room-overlay' },
          React.createElement('div', { className: 'room-modal' },
            React.createElement('div', { className: 'room-title' }, 'Range Rover Electric'),
            React.createElement('div', { className: 'room-heading' }, 'Creative Sprint Board'),
            React.createElement('div', { className: 'room-actions' },
              React.createElement('button', { className: 'room-btn room-btn-primary', onClick: createRoom }, 'Create Room'),
              React.createElement('button', { className: 'room-btn', onClick: function() { setRoomScreen('join'); } }, 'Join Room'),
              React.createElement('button', { className: 'room-back', onClick: skipRoom }, 'Continue without sync')
            ),
            roomError ? React.createElement('div', { className: 'room-error' }, roomError) : null
          )
        );
      }

      if (roomScreen === 'host') {
        return React.createElement('div', { className: 'room-overlay' },
          React.createElement('div', { className: 'room-modal' },
            React.createElement('div', { className: 'room-title' }, 'Room Created'),
            React.createElement('div', { className: 'room-heading' }, 'Share this code'),
            React.createElement('div', { className: 'room-code-display' }, roomCode),
            React.createElement('div', { className: 'room-code-hint' }, 'Others enter this code to join your board'),
            React.createElement('button', { className: 'room-btn room-btn-primary', onClick: function() { setRoomScreen('active'); } }, 'Open Board')
          )
        );
      }

      if (roomScreen === 'join') {
        return React.createElement('div', { className: 'room-overlay' },
          React.createElement('div', { className: 'room-modal' },
            React.createElement('div', { className: 'room-title' }, 'Join Room'),
            React.createElement('div', { className: 'room-heading' }, 'Enter room code'),
            React.createElement('input', {
              className: 'room-input', value: joinCode,
              onChange: function(e) { setJoinCode(e.target.value.toUpperCase().slice(0, 6)); },
              placeholder: 'XXXXXX', maxLength: 6, autoFocus: true,
              onKeyDown: function(e) { if (e.key === 'Enter') joinRoom(); }
            }),
            React.createElement('div', { style: { marginTop: '16px' } },
              React.createElement('button', { className: 'room-btn room-btn-primary', onClick: joinRoom }, 'Join')
            ),
            roomError ? React.createElement('div', { className: 'room-error' }, roomError) : null,
            React.createElement('button', { className: 'room-back', onClick: function() { setRoomScreen('choose'); } }, 'Back')
          )
        );
      }

      return React.createElement(React.Fragment, null,
        React.createElement('div', { className: 'header' }, 'RANGE ROVER ELECTRIC — CREATIVE SPRINT'),
        React.createElement('div', { className: 'footer' }, 'POWERED BY WPP OPEN'),

        isConnected ? React.createElement('div', { className: 'connection-bar' },
          React.createElement('div', { className: 'connection-dot' }),
          React.createElement('span', { className: 'connection-code' }, roomCode),
          isSaving ? React.createElement('span', { className: 'saving-indicator' }, 'Saving...') :
            React.createElement('span', { className: 'connection-text' }, 'Synced')
        ) : null,

        React.createElement('div', { className: 'sticky-pads' },
          React.createElement('div', { className: 'sticky-pad', onClick: function() { createSticky('yellow'); } },
            React.createElement('div', { className: 'pad-stack' },
              React.createElement('div', { className: 'pad-square', style: { background: STICKY_COLORS.yellow } }),
              React.createElement('div', { className: 'pad-square', style: { background: STICKY_COLORS.yellow } }),
              React.createElement('div', { className: 'pad-square', style: { background: STICKY_COLORS.yellow } })
            ),
            React.createElement('div', { className: 'pad-label' }, 'Human Idea')
          ),
          React.createElement('div', { className: 'sticky-pad', onClick: function() { createSticky('blue'); } },
            React.createElement('div', { className: 'pad-stack' },
              React.createElement('div', { className: 'pad-square', style: { background: STICKY_COLORS.blue } }),
              React.createElement('div', { className: 'pad-square', style: { background: STICKY_COLORS.blue } }),
              React.createElement('div', { className: 'pad-square', style: { background: STICKY_COLORS.blue } })
            ),
            React.createElement('div', { className: 'pad-label' }, 'Agent Output')
          )
        ),

        React.createElement('div', { className: 'zoom-controls' },
          React.createElement('button', { className: 'zoom-btn', onClick: function() { setZoom(function(p) { return Math.max(MIN_ZOOM, p - 0.1); }); } }, '−'),
          React.createElement('div', { className: 'zoom-level' }, Math.round(zoom * 100) + '%'),
          React.createElement('button', { className: 'zoom-btn', onClick: function() { setZoom(function(p) { return Math.min(MAX_ZOOM, p + 0.1); }); } }, '+'),
          React.createElement('div', { className: 'zoom-divider' }),
          React.createElement('button', { className: 'zoom-btn', onClick: function() { setZoom(0.65); setPan({ x: 50, y: 20 }); }, style: { fontSize: '11px', width: '32px', borderRadius: '6px' } }, 'FIT')
        ),

        React.createElement('div', { ref: containerRef, className: 'canvas-container' + (isPanning ? ' panning' : ''), onWheel: handleWheel, onMouseDown: handlePanStart },
          React.createElement('div', { className: 'canvas', style: { width: CANVAS_WIDTH, height: CANVAS_HEIGHT, transform: 'translate(' + pan.x + 'px,' + pan.y + 'px) scale(' + zoom + ')' } },
            ROW_LABELS.map(function(l, i) { return React.createElement('div', { key: i, className: 'row-label', style: { left: l.x, top: l.y } }, l.text); }),
            boxes.map(function(b) { return React.createElement(ContainerBox, { key: b.id, box: b, onResize: handleBoxResize, onMove: handleBoxMove, zoom: zoom }); }),
            stickies.map(function(s) { return React.createElement(StickyNote, { key: s.id, sticky: s, onUpdate: updateSticky, onDelete: deleteSticky, zoom: zoom }); }),
            images.map(function(im) { return React.createElement(ImageElement, { key: im.id, image: im, onUpdate: updateImage, onDelete: deleteImage, zoom: zoom }); })
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>

</body></html>
